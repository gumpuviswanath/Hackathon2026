name: AI Memory Agent with pgvector

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  memory-agent:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: ankane/pgvector:latest
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: memorydb
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      # Your steps that insert PR data into Postgres go here

      - name: Export PR data to JSON
        run: |
          psql -h localhost -U postgres -d memorydb -c \
          "COPY (SELECT * FROM your_table) TO STDOUT WITH JSON" > pr_data.json
        env:
          PGPASSWORD: postgres


      - name: Upload dump as artifact
        uses: actions/upload-artifact@v4
        with:
          name: memorydb-dump
          path: memorydb.sql

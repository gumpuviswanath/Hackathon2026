name: AI Memory Agent with pgvector

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  memory-agent:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: ankane/pgvector:latest
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: memorydb
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      # Step 1: Create table if not exists
      - name: Create PR data table
        run: |
          psql -h localhost -U postgres -d memorydb -c "
          CREATE TABLE IF NOT EXISTS pr_data (
            id SERIAL PRIMARY KEY,
            pr_number INT,
            title TEXT,
            body TEXT,
            created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
          );"
        env:
          PGPASSWORD: postgres

      # Step 2: Insert PR metadata into table
      - name: Insert PR metadata
        run: |
          psql -h localhost -U postgres -d memorydb -c \
          "INSERT INTO pr_data (pr_number, title, body) VALUES (
            ${{ github.event.pull_request.number }},
            '${{ github.event.pull_request.title }}',
            '${{ github.event.pull_request.body }}'
          );"
        env:
          PGPASSWORD: postgres

      # Step 3: Export table data to JSON
      - name: Export PR data to JSON
        run: |
          psql -h localhost -U postgres -d memorydb -c \
          "COPY (SELECT json_agg(t) FROM (SELECT * FROM pr_data) t) TO STDOUT" > pr_data.json
        env:
          PGPASSWORD: postgres

      # Step 4: Upload JSON artifact
      - name: Upload PR data artifact
        uses: actions/upload-artifact@v4
        with:
          name: pr-data
          path: pr_data.json

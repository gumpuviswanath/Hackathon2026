name: Playwright E2E Suite -> Extent Report -> GitHub Pages

# Manual only - spins up the full stack (4 Spring Boot backends + the portal) and
# runs the whole Cucumber/Playwright suite, so it's heavier than the other
# workflows. Click "Run workflow" in the Actions tab whenever you want a fresh
# report published.
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build backend services
        run: mvn -B clean package -DskipTests

      # ---------------------------------------------------------------------------
      # Start the 4 Spring Boot backends (Customer/KYC/Account/Product) the same
      # way as locally: each java process backgrounded with its own working
      # directory, since the H2 file DB path is relative to it.
      # ---------------------------------------------------------------------------
      - name: Start backend services
        run: |
          (cd Bank-Customer-Id && nohup java -jar target/customer-service-*.jar > "$GITHUB_WORKSPACE/customer-service.log" 2>&1 &)
          (cd Bank-KYC-Service && nohup java -jar target/kyc-service-*.jar > "$GITHUB_WORKSPACE/kyc-service.log" 2>&1 &)
          (cd Bank-Account-Service && nohup java -jar target/account-service-*.jar > "$GITHUB_WORKSPACE/account-service.log" 2>&1 &)
          (cd Bank-Product-Service && nohup java -jar target/product-service-*.jar > "$GITHUB_WORKSPACE/product-service.log" 2>&1 &)

      - name: Wait for backend services
        run: |
          for i in $(seq 1 30); do
            ok=0
            for url in http://localhost:3000/customer/all http://localhost:3001/kyc/all http://localhost:3002/account/all http://localhost:3003/product/all; do
              code=$(curl -s -o /dev/null -w "%{http_code}" "$url" --max-time 2 || true)
              [ "$code" = "200" ] && ok=$((ok+1))
            done
            [ "$ok" -eq 4 ] && { echo "All 4 backend services are up."; exit 0; }
            echo "Waiting for backend services ($i/30)..."
            sleep 3
          done
          echo "::error::Backend services did not become ready in time."
          exit 1

      - name: Install frontend dependencies
        working-directory: Customer-Onboarding-Portal
        run: npm ci

      - name: Start frontend (portal)
        working-directory: Customer-Onboarding-Portal
        run: nohup npm start > "$GITHUB_WORKSPACE/portal.log" 2>&1 &

      - name: Wait for frontend
        run: |
          for i in $(seq 1 20); do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3005 --max-time 2 || true)
            [ "$code" = "200" ] && { echo "Portal is up."; exit 0; }
            echo "Waiting for portal ($i/20)..."
            sleep 3
          done
          echo "::error::Portal did not become ready in time."
          exit 1

      - name: Install Playwright browsers
        working-directory: Playwright-Testing
        run: |
          mvn -B -q test-compile dependency:build-classpath -Dmdep.outputFile=cp.txt
          java -cp "target/classes:target/test-classes:$(cat cp.txt)" com.microsoft.playwright.CLI install --with-deps chromium

      - name: Run Cucumber/Playwright suite
        working-directory: Playwright-Testing
        run: mvn -B test -Dheadless=true

      # surefire has testFailureIgnore=true (so a broken scenario doesn't abort the
      # whole run before the report is generated), which means the mvn step above
      # always exits 0 - without this check the job (and the workflow_run event
      # self-heal-locators.yml listens for) would always report "success" even
      # when scenarios genuinely failed.
      - name: Fail the job if any Cucumber steps failed
        if: always()
        working-directory: Playwright-Testing
        run: |
          if [ ! -f target/cucumber-reports/cucumber.json ]; then
            echo "::error::cucumber.json not found - the test run likely failed before producing results."
            exit 1
          fi
          FAILED=$(jq '[.[].elements[]?.steps[]? | select(.result.status == "failed")] | length' target/cucumber-reports/cucumber.json)
          if [ "$FAILED" -gt 0 ]; then
            echo "::error::$FAILED Cucumber step(s) failed."
            exit 1
          fi
          echo "All Cucumber steps passed."

      - name: Show backend/portal logs on failure
        if: failure()
        run: |
          for f in customer-service kyc-service account-service product-service portal; do
            echo "::group::$f.log"
            tail -100 "$GITHUB_WORKSPACE/$f.log" 2>/dev/null || echo "(no log)"
            echo "::endgroup::"
          done

      - name: Upload Extent report as build artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: extent-report
          path: Playwright-Testing/target/ExtentReport/
          if-no-files-found: warn

      # Consumed by self-heal-locators.yml (triggered via workflow_run on this
      # workflow's failure) to diagnose broken locators: per-scenario screenshots,
      # DOM snapshots captured at the moment of failure (Hooks.java), and the
      # structured pass/fail/error data in cucumber.json.
      - name: Upload test failure context
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-failure-context
          path: |
            Playwright-Testing/target/screenshots/
            Playwright-Testing/target/dom-snapshots/
            Playwright-Testing/target/cucumber-reports/cucumber.json
          if-no-files-found: ignore

      - name: Setup Pages
        if: always()
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: Playwright-Testing/target/ExtentReport/

  deploy:
    needs: test
    # github-pages environment protection rules only allow main to deploy;
    # skip this job on other branches instead of failing red.
    if: always() && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

name: Kafka PR Reviews

on:
  pull_request:
    types: [opened, synchronize, reopened, review_requested, review]

jobs:
  kafka-pr-job:
    runs-on: ubuntu-latest

    services:
      kafka:
        image: confluentinc/cp-kafka:7.6.1
        ports:
          - 9092:9092
        env:
          KAFKA_PROCESS_ROLES: broker,controller
          KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
          KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
          KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
          KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
          KAFKA_NODE_ID: 1
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

    steps:
      - uses: actions/checkout@v4

      - name: Create Kafka topic
        run: |
          docker exec kafka \
            kafka-topics --create --topic pr-reviews \
            --bootstrap-server localhost:9092 --partitions 1 --replication-factor 1 || true

      - name: Publish PR review event to Kafka
        run: |
          echo '{"pr_number":"${{ github.event.pull_request.number }}","title":"${{ github.event.pull_request.title }}","action":"${{ github.event.action }}"}' \
          | docker exec -i kafka \
            kafka-console-producer --broker-list localhost:9092 --topic pr-reviews

      - name: Consume PR review event from Kafka
        run: |
          docker exec kafka \
            kafka-console-consumer --bootstrap-server localhost:9092 --topic pr-reviews --from-beginning --timeout-ms 5000 --max-messages 10

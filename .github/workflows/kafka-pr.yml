name: Kafka PR Reviews

on:
  pull_request:
    types: [opened, synchronize, reopened, review_requested, review]

jobs:
  kafka-pr-job:
    runs-on: ubuntu-latest

    services:
      kafka:
        image: bitnami/kafka:latest
        ports:
          - 9092:9092
        env:
          KAFKA_ENABLE_KRAFT: yes
          KAFKA_CFG_PROCESS_ROLES: broker,controller
          KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
          KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
          KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
          KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
          ALLOW_PLAINTEXT_LISTENER: yes

    steps:
      - uses: actions/checkout@v4

      - name: Create Kafka topic
        run: |
          docker exec $(docker ps -q -f ancestor=bitnami/kafka:latest) \
            kafka-topics.sh --create --topic pr-reviews \
            --bootstrap-server localhost:9092 --partitions 1 --replication-factor 1

      - name: Publish PR review event to Kafka
        run: |
          echo '{"pr_number":"${{ github.event.pull_request.number }}","title":"${{ github.event.pull_request.title }}","action":"${{ github.event.action }}"}' \
          | docker exec -i $(docker ps -q -f ancestor=bitnami/kafka:latest) \
            kafka-console-producer.sh --broker-list localhost:9092 --topic pr-reviews

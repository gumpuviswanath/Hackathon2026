name: PR Agent with Kafka

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  pr-agent:
    runs-on: ubuntu-latest

    services:
      kafka:
        image: confluentinc/cp-kafka:7.6.1
        ports:
          - 9092:9092
        env:
          KAFKA_PROCESS_ROLES: broker,controller
          KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
          KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
          KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
          KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
          KAFKA_NODE_ID: 1
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

    steps:
      - uses: actions/checkout@v4

      - name: Install Kafka CLI tools
        run: |
          curl -sL https://archive.apache.org/dist/kafka/3.6.1/kafka_2.13-3.6.1.tgz | tar xz
          mv kafka_2.13-3.6.1 kafka

      - name: Publish PR review event to Kafka
        run: |
          echo '{"pr_number":"${{ github.event.pull_request.number }}","title":"${{ github.event.pull_request.title }}","review":"Automated review started"}' \
          | ./kafka/bin/kafka-console-producer.sh --broker-list localhost:9092 --topic pr-reviews
